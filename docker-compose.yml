services:
  api:
    build:
      context: ./backend
      dockerfile: KeyVault.Api/Dockerfile
    image: keyvault-api
    ports:
      - "3030:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Database__Host: db
      Database__Port: 5432
      Database__Database: keyvault
      Database__Username: postgres
      Database__Password: postgres
      Database__Ssl: false
      Database__TrustServerCertificate: false
      Encryption__MasterKey: ${ENCRYPTION_MASTERKEY}
      IdentityProvider__Authority: ${IDP_AUTHORITY}
      IdentityProvider__Audience: ${IDP_AUDIENCE}
      Cors__AllowedOrigins: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3030/api
        VITE_AUTH0_DOMAIN: ${IDP_DOMAIN}
        VITE_AUTH0_CLIENT_ID: ${IDP_CLIENT_ID}
        VITE_AUTH0_AUDIENCE: ${IDP_AUDIENCE}
        VITE_AUTH0_LOGOUT_URI: http://localhost:3001
    image: keyvault-web
    ports:
      - "3000:80"
    depends_on:
      - api
        
  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile
      args:
        VITE_APPLICATION_URL: http://localhost:3000
        VITE_REPOSITORY_URL: ${REPOSITORY_URL}
        VITE_LINKEDIN_URL: ${LINKEDIN_URL}
        VITE_GITHUB_URL: ${GITHUB_URL}
    image: keyvault-landing
    ports:
      - "3001:80"

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: keyvault
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
